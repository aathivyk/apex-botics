<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Botics | Home</title>
    <style>
        body { background-color: black; color: white; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 50px; }
        h1 { color: #d9534f; font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 40px; }
        
        /* The Three Course Buttons */
        .course-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .course-btn { background-color: #222; color: #d9534f; border: 2px solid #d9534f; padding: 20px 40px; font-size: 1.2rem; text-decoration: none; font-weight: bold; width: 200px; }
        .course-btn:hover { background-color: #d9534f; color: white; }

        /* The Bottom Action Buttons */
        .action-container { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .action-btn { background-color: transparent; color: white; border: 1px solid white; padding: 15px 30px; text-decoration: none; font-size: 1rem; width: 250px; }
        .action-btn:hover { border-color: #d9534f; color: #d9534f; }
        
        .register-btn { background-color: #d9534f; color: white; border: 1px solid #d9534f; padding: 15px 30px; text-decoration: none; font-size: 1rem; font-weight: bold; width: 250px; }
        .register-btn:hover { background-color: white; color: black; border-color: white; }
    </style>
</head>
<body>

    <h1>APEX BOTICS</h1>
    <p>NEXT GENERATION ROBOTICS CURRICULUM</p>

    <div class="course-container">
        <a href="#" class="course-btn">ALPHA</a>
        <a href="#" class="course-btn">BETA</a>
        <a href="#" class="course-btn">PRIME</a>
    </div>

    <div class="action-container">

        <a href="register.html" class="register-btn">REGISTER NOW</a>
    </div>

</body>
</html>
