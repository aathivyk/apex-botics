<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Botics | Robotics Excellence</title>
    <style>
        :root {
            --neon-red: #ff0000;
            --deep-red: #8b0000;
            --bg-black: #050505;
            --card-gray: #111111;
            --border-gray: #222222;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 100px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a0000, var(--bg-black));
            border-bottom: 2px solid var(--neon-red);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .tagline {
            color: var(--neon-red);
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        h2 {
            text-transform: uppercase;
            border-left: 4px solid var(--neon-red);
            padding-left: 15px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-gray);
            border: 1px solid var(--border-gray);
            padding: 25px;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--neon-red);
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.1);
        }

        .card h3 {
            margin-top: 0;
            color: var(--neon-red);
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            color: #ccc;
        }

        ul li::before {
            content: "» ";
            color: var(--neon-red);
        }

        .cta-box {
            background: linear-gradient(45deg, #111, #200);
            padding: 40px;
            text-align: center;
            border: 1px solid var(--neon-red);
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            background: var(--neon-red);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 2px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px white;
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #444;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <div class="tagline">Apex Botics Laboratory</div>
    <h1>APEX</h1>
    <p>Advanced Robotics & Autonomous Navigation Systems</p>
</header>

<div class="container">
    
    <h2>Project Curriculum</h2>
    <div class="grid">

            <h3>Level 1: Fundamentals</h3>
            <p>ESP32 Architecture, basic C++ programming, and LED/Sensor circuits.</p>
        </div>
        <div class="card">
            <h3>Level 2: Locomotion</h3>
            <p>Motor driver integration (L298N) and ultrasonic obstacle avoidance.</p>
        </div>
