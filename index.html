<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Botics</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            text-align: center;
        }
        header {
            padding: 100px 20px;
            background: #1a0000;
            border-bottom: 2px solid #ff3131;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            margin: 0;
            text-transform: uppercase;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 50px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #161616;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #222;
        }
        .card h3 {
            color: #ff3131;
            text-transform: uppercase;
        }
        .btn {
            display: inline-block;
            background: #ff3131;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>APEX</h1>
    <p style="color: #ff3131; font-weight: bold; letter-spacing: 2px;">ROBOTICS LABORATORY</p>
</header>

<div class="container">
    <h2>Course Levels</h2>
    <div class="grid">
        <div class="card">
            <h3>Level 1</h3>
            <p>Introduction to ESP32 and basic electronic components.</p>
        </div>
        <div class="card">
            <h3>Level 2</h3>
            <p>Building a robot with L298N and ultrasonic sensors.</p>
        </div>
        <div class="card">
            <h3>Level 3</h3>
            <p>Advanced mapping and navigation with 5-sensor SLAM.</p>
        </div>
    </div>

    <a href="mailto:your-email@example.com" class="btn">Email Us</a>
</div>

<footer>
    <p style="color: #444; padding: 40px;">&copy; 2026 APEX BOTICS | REDMOND, WA</p>
</footer>

</body>
</html>
