<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Botics</title>
    <style>
        :root { --red: #ff3131; --bg: #0a0a0a; --card: #161616; --radius: 18px; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 100px 20px; background: radial-gradient(circle, #200 0%, #0a0a0a 100%); border-bottom: 2px solid var(--red); }
        h1 { font-size: 3rem; letter-spacing: 10px; text-transform: uppercase; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 40px 20px; }
        
        /* Keeps courses centered */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; justify-content: center; }
        
        .card-link { text-decoration: none; color: inherit; }
        .card { background: var(--card); border: 1px solid #222; padding: 40px 20px; border-radius: var(--radius); transition: 0.3s; height: 100%; box-sizing: border-box; }
        .card:hover { border-color: var(--red); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(255,49,49,0.2); }
        .card h3 { color: var(--red); text-transform: uppercase; margin-top: 0; }

        /* Button Area Styling */
        .button-group { 
            margin-top: 150px; 
            margin-bottom: 100px; 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        
        .btn { 
            display: inline-block; 
            padding: 18px 40px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            text-transform: uppercase; 
            transition: 0.3s; 
            min-width: 220px;
            letter-spacing: 1px;
        }

        /* Primary Button (Contact) */
        .btn-primary { 
            background: var(--red); 
            color: white; 
            border: 2px solid var(--red);
        }
        .btn-primary:hover { 
            background: white; 
            color: black; 
            border-color: white;
            transform: scale(1.05); 
        }

        /* Secondary Button (About) */
        .btn-secondary { 
            background: transparent; 
            color: white; 
            border: 2px solid #444;
        }
        .btn-secondary:hover { 
            border-color: var(--red);
            color: var(--red);
            transform: scale(1.05); 
        }

        footer { color:#222; padding: 40px; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header>
        <h1>APEX BOTICS</h1>
        <p style="color: #666; letter-spacing: 2px;">NEXT-GEN ENGINEERING</p>
    </header>

    <div class="container">
        <div class="grid">
            <a href="alpha.html" class="card-link">
                <div class="card">
                    <h3>Apex Alpha</h3>
                    <p>Master the fundamentals of hardware logic.</p>
                </div>
            </a>
            <a href="beta.html" class="card-link">
                <div class="card">
                    <h3>Apex Beta</h3>
                    <p>Build advanced systems with motor control.</p>
                </div>
            </a>
            <a href="prime.html" class="card-link">
                <div class="card">
                    <h3>Apex Prime</h3>
                    <p>Deploy fully autonomous SLAM systems.</p>
                </div>
            </a>
        </div>

        <div class="button-group">
            <a href="mailto:contact@apexbotics.com" class="btn btn-primary">Initialize Contact</a>
            <a href="about.html" class="btn btn-secondary">About the Founder</a>
        </div>
    </div>

    <footer>&copy; 2026 APEX BOTICS | REDMOND, WA</footer>
</body>
</html>
