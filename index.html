<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Botics | Robotics Excellence</title>
    <style>
        :root {
            --neon-red: #ff3131;
            --soft-black: #0a0a0a;
            --card-bg: #161616;
            --premium-gray: #222222;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--soft-black);
            color: #ffffff;
            margin: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 120px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #2a0000 0%, var(--soft-black) 70%);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 800;
            background: linear-gradient(to bottom, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--neon-red);
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: block;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px 20px;
        }

        h2 {
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        h2::after {
            content: "";
            height: 2px;
            background: var(--neon-red);
            flex-grow: 1;
            margin-left: 20px;
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--premium-gray);
            padding: 30px;
            border-radius: var(--radius);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--neon-red);
            transform: translateY(-8px);
            background: #1c1c1c;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .card h3 {
            margin-top: 0;
            color: var(--neon-red);
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .cta-box {
            background: linear-gradient(145deg, #111111, #0a0a0a);
            padding: 50px;
            text-align: center;
            border-radius: var(--radius);
            border: 1px solid var(--premium-gray);
            margin-top: 50px;
        }

        .btn {
            display: inline-block;
            background: var(--neon-red);
            color: white;
            padding: 18px 45px;
            text-decoration: none;
            font-weight: bold
