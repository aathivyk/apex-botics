<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Botics | Redline Engineering</title>
    <style>
        :root {
            --primary-red: #ff3131; /* Racing Red */
            --deep-red: #8b0000;
            --bg-dark: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-gray: #b3b3b3;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* Techy Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 49, 49, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 49, 49, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(180deg, #1a0000 0%, #0d0d0d 100%);
            border-bottom: 3px solid var(--primary-red);
            box-shadow: 0 10px 30px rgba(255, 49, 49, 0.2);
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 8px;
            margin: 0;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px var(--primary-red);
        }

        .tagline {
            color: var(--primary-red);
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .container { max-width: 1100px; margin: auto; padding: 50px 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 0px; /* Sharp edges look more industrial */
            border-left: 4px solid #333;
            transition: all 0.4s ease;
            position: relative;
        }

        .card:hover {
            border-left: 4px solid var(--primary-red);
            background: #252525;
            transform: scale(1.02);
            box-shadow: -10px 10px 0px rgba(255, 49, 49, 0.1);
        }

        .card h3 {
            color: white;
            font-size: 1.5rem;
            margin-top: 0;
            text-transform: uppercase;
        }
